<li class="nav-item">
    <a class="nav-link {% if page.url contains group %}active{% endif %}"
       role="button" data-bs-toggle="collapse" data-bs-target="#{{ group }}"
       aria-expanded="{% if page.url contains group %}true{% else %}false{% endif %}"
       aria-controls="{{ group }}">
        {{ title }}
    </a>
    <div class="{% if page.url contains group %}collapse show{% else %}collapse{% endif %}" id="{{ group }}">
        <ul class="nav flex-column">
            {% assign sorted = collections.components %}
            {% for item in sorted %}
                <li>
                    <a class="nav-link {% if item.url == page.url %}active{% endif %}"
                       href="{{ item.url }}"
                       {% if item.url == page.url %}aria-current="true"{% endif %}>
                        {{ item.data.title }}
                    </a>
                </li>
            {% endfor %}
        </ul>
    </div>
</li>
