<!DOCTYPE html>
<html lang="{{ site.lang | default: 'en-US' }}">
  <head>
    <meta name="viewport" content="width=device-width">
    <meta charset="utf-8">
    <title>{{ title }} - {{ site.title }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;600;700;800&display=swap">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.34.0/dist/tabler-icons.min.css">
    <link rel="stylesheet" href="{{ '/v3.2/assets/css/main.css' | relative_url }}">
    <link rel="shortcut icon" href="{{ '/assets/img/favicon-32x32.png' | relative_url }}" type="image/x-icon"/>
    <script>
      // Restore theme preference before render to avoid flash
      (function() {
        var theme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-bs-theme', theme);
      })();
    </script>
  </head>
  <body>
    {{ content }}
    <script>
      (function() {
        var btn = document.getElementById('themeToggle');
        if (!btn) return;
        function applyTheme(theme) {
          document.documentElement.setAttribute('data-bs-theme', theme);
          localStorage.setItem('theme', theme);
          btn.setAttribute('data-theme', theme);
          var label = btn.querySelector('[data-theme-label]');
          if (label) label.textContent = theme === 'dark' ? 'Light mode' : 'Dark mode';
        }
        applyTheme(localStorage.getItem('theme') || 'light');
        btn.addEventListener('click', function() {
          applyTheme(localStorage.getItem('theme') === 'dark' ? 'light' : 'dark');
        });
      })();
    </script>
  </body>
</html>
