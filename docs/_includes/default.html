<!DOCTYPE html>
<html lang="{{ site.lang | default: 'en-US' }}">
  <head>
    <meta name="viewport" content="width=device-width">
    <meta charset="utf-8">
    <title>{{ title }} - {{ site.title }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;600;700;800&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;600;700;800&display=swap"></noscript>
    <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
    <link rel="shortcut icon" href="{{ '/assets/img/favicon-32x32.png' | relative_url }}" type="image/x-icon"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github-dark.min.css" media="none" id="hljs-dark">
    <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
    <script>
      // Restore theme preference before render to avoid flash
      (function() {
        var theme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-bs-theme', theme);
        if (theme === 'dark') {
          document.getElementById('hljs-dark').media = 'all';
        }
      })();
    </script>
  </head>
  <body data-bs-spy="scroll" data-bs-target="#sidebar-nav" data-bs-offset="100" tabindex="0">
    {% include "navigation.html" %}
    <div class="main-content" id="main-content">
      <div class="container">
        {{ content}}
      </div>
    </div>
    <script src="{{ '/assets/js/next-app-ui.min.js' | relative_url }}"></script>
    <script src="{{ '/assets/js/docs.js' | relative_url }}"></script>
    <script>hljs.highlightAll();</script>
    <script>
      (function() {
        var btn = document.getElementById('themeToggle');
        if (!btn) return;
        var hljsDark = document.getElementById('hljs-dark');
        var moonSvg = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>';
        var sunSvg = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>';
        function applyTheme(theme) {
          document.documentElement.setAttribute('data-bs-theme', theme);
          btn.innerHTML = (theme === 'dark' ? sunSvg : moonSvg) + '<span>' + (theme === 'dark' ? 'Light mode' : 'Dark mode') + '</span>';
          hljsDark.media = theme === 'dark' ? 'all' : 'none';
          localStorage.setItem('theme', theme);
        }
        var saved = localStorage.getItem('theme') || 'light';
        applyTheme(saved);
        btn.addEventListener('click', function() {
          var next = localStorage.getItem('theme') === 'dark' ? 'light' : 'dark';
          applyTheme(next);
        });
      })();
    </script>
  </body>
</html>
